<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 2rem;
        }
        form {
            display: grid;
            gap: 1rem;
            max-width: 500px;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .checkbox-group, .radio-group {
            display: flex;
            gap: 1rem;
        }
        .error {
            color: red;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>Test Form for AI Extension</h1>
    <form id="test-form">
        <div>
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" name="full-name" placeholder="John Doe">
        </div>
        <div>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com">
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8">
            <span id="password-error" class="error"></span>
        </div>
        <div>
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
            <span id="confirm-password-error" class="error"></span>
        </div>
        <div>
            <input type="checkbox" id="show-password">
            <label for="show-password">Show Password</label>
        </div>
        <div>
            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" rows="4"></textarea>
        </div>
        <div class="radio-group">
            <label>Gender:</label>
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
        <div class="checkbox-group">
            <label>Interests:</label>
            <label><input type="checkbox" name="interests" value="reading"> Reading</label>
            <label><input type="checkbox" name="interests" value="coding"> Coding</label>
            <label><input type="checkbox" name="interests" value="hiking"> Hiking</label>
        </div>
        <div>
            <label for="country">Country</label>
            <select id="country" name="country">
                <option value="">Select a country</option>
                <option value="USA">United States</option>
                <option value="Canada">Canada</option>
                <option value="UK">United Kingdom</option>
                <option value="Australia">Australia</option>
            </select>
        </div>
        <div>
            <label for="birthdate">Birthdate</label>
            <input type="date" id="birthdate" name="birthdate">
        </div>
        <div>
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10">
        </div>
        <div>
            <label for="profile-picture">Profile Picture</label>
            <input type="file" id="profile-picture" name="profile-picture">
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
    <script>
        const form = document.getElementById('test-form');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm-password');
        const passwordError = document.getElementById('password-error');
        const confirmPasswordError = document.getElementById('confirm-password-error');
        const showPassword = document.getElementById('show-password');

        form.addEventListener('submit', function(event) {
            let isValid = true;
            passwordError.textContent = '';
            confirmPasswordError.textContent = '';

            if (password.value.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters long.';
                isValid = false;
            }

            if (password.value !== confirmPassword.value) {
                confirmPasswordError.textContent = 'Passwords do not match.';
                isValid = false;
            }

            if (!isValid) {
                event.preventDefault();
            }
        });

        showPassword.addEventListener('change', function() {
            const isChecked = this.checked;
            password.type = isChecked ? 'text' : 'password';
            confirmPassword.type = isChecked ? 'text' : 'password';
        });
    </script>
</body>
</html>
