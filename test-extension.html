<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Form for AI Form Filler</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>Test Form for AI Form Filler Extension</h1>
    <p>
      Use this form to test the AI Form Filler extension. Install the extension
      and click "Fill Forms" in the popup.
    </p>

    <form>
      <div class="form-group">
        <label for="full-name">Full Name:</label>
        <input
          type="text"
          id="full-name"
          name="full-name"
          placeholder="Enter your full name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email Address:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="Enter your phone number"
        />
      </div>

      <div class="form-group">
        <label for="company">Company Name:</label>
        <input
          type="text"
          id="company"
          name="company"
          placeholder="Enter your company"
        />
      </div>

      <div class="form-group">
        <label for="address">Street Address:</label>
        <input
          type="text"
          id="address"
          name="address"
          placeholder="Enter your address"
        />
      </div>

      <div class="form-group">
        <label for="city">City:</label>
        <input
          type="text"
          id="city"
          name="city"
          placeholder="Enter your city"
        />
      </div>

      <div class="form-group">
        <label for="zipcode">ZIP Code:</label>
        <input
          type="text"
          id="zipcode"
          name="zipcode"
          placeholder="Enter ZIP code"
        />
      </div>

      <div class="form-group">
        <label for="birth-date">Date of Birth:</label>
        <input type="date" id="birth-date" name="birth-date" />
      </div>

      <div class="form-group">
        <label for="comments">Additional Comments:</label>
        <textarea
          id="comments"
          name="comments"
          rows="4"
          placeholder="Any additional information"
        ></textarea>
      </div>

      <button type="submit">Submit Form</button>
    </form>
  </body>
</html>
