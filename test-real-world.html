<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-World Forms - AI Form Filler Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fafafa;
        }
        .form-container {
            background: white;
            margin: 30px 0;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        .required {
            color: #e74c3c;
        }
        .form-section {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .form-section h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .submit-btn {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .submit-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <h1>🌍 Real-World Form Testing</h1>
    <p>These forms simulate real-world scenarios you'd encounter on actual websites.</p>

    <!-- 1. Job Application Form -->
    <div class="form-container">
        <h2>💼 Job Application Form</h2>
        <form>
            <div class="form-section">
                <h3>Personal Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="applicant-first">First Name <span class="required">*</span></label>
                        <input type="text" id="applicant-first" name="firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="applicant-last">Last Name <span class="required">*</span></label>
                        <input type="text" id="applicant-last" name="lastname" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="applicant-email">Email Address <span class="required">*</span></label>
                        <input type="email" id="applicant-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="applicant-phone">Phone Number</label>
                        <input type="tel" id="applicant-phone" name="phone">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Employment History</h3>
                <div class="form-group">
                    <label for="current-employer">Current or Most Recent Employer</label>
                    <input type="text" id="current-employer" name="current-company">
                </div>

                    <label for="current-position">Current Job Titl
